services:
  # 开发用 PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: blog-postgres-dev
    environment:
      POSTGRES_USER: blog
      POSTGRES_PASSWORD: blog_password
      POSTGRES_DB: blog
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog -d blog"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - blog-network

volumes:
  postgres_dev_data:

networks:
  blog-network:
    driver: bridge
